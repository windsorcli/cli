name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
      
permissions:
  contents: write
  issues: read
  pull-requests: read  
jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [amd64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7 renovate: depName=actions/setup-go
        with:
          go-version-file: go.mod

      - name: Setup Windows optimization environment
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          echo "GOCACHE=D:\go-cache" >> $env:GITHUB_ENV
          echo "GOMODCACHE=D:\go-mod" >> $env:GITHUB_ENV
          echo "GOTMPDIR=D:\go-tmp" >> $env:GITHUB_ENV
          echo "TMP=D:\tmp" >> $env:GITHUB_ENV
          echo "TEMP=D:\tmp" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Force -Path "D:\go-cache"
          New-Item -ItemType Directory -Force -Path "D:\go-mod" 
          New-Item -ItemType Directory -Force -Path "D:\go-tmp"
          New-Item -ItemType Directory -Force -Path "D:\tmp"
        shell: pwsh

      - name: Install Terraform (integration tests)
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1 renovate: depName=hashicorp/setup-terraform
        with:
          terraform_version: "1.12.2" # satisfies CLI min 1.12.2
          terraform_wrapper: false

      - name: Install Docker CLI (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install docker

      - name: Install Docker CLI (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "27.4.1"
          $url = "https://download.docker.com/win/static/stable/x86_64/docker-$version.zip"
          Invoke-WebRequest -Uri $url -OutFile docker.zip
          Expand-Archive docker.zip -DestinationPath "$env:TEMP\docker"
          echo "$env:TEMP\docker\docker" >> $env:GITHUB_PATH
          $env:PATH = "$env:TEMP\docker\docker;$env:PATH"
          docker --version

      - name: Cache Go Modules (Linux/macOS)
        if: ${{ matrix.os != 'windows-latest' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Go Modules (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            D:\\go-cache
            D:\\go-mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
  
      - name: Install Dependencies
        run: go install ./... && go install github.com/go-task/task/v3/cmd/task@v3.52.0

      - name: Add Go bin to PATH (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: echo "PATH=$HOME/go/bin:$PATH" >> $GITHUB_ENV

      - name: Add Go bin to PATH (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "PATH=$env:USERPROFILE\go\bin;$env:PATH" >> $env:GITHUB_ENV
        shell: pwsh
          
      - name: Run tests
        run: task test:all

      - name: Test Build Windsor CLI on macOS/Linux
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          VERSION=$(echo "${GITHUB_REF}" | sed 's/refs\/heads\///' | sed 's/refs\/tags\///')
          echo "Testing build for version: $VERSION"
          COMMIT_SHA=${{ github.sha }}
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            GOOS=linux GOARCH=${{ matrix.arch }} go build -ldflags "-s -w -X 'github.com/${{ github.repository }}/cmd.version=$VERSION' -X 'github.com/${{ github.repository }}/cmd.commitSHA=$COMMIT_SHA'" -o /dev/null cmd/windsor/main.go
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            GOOS=darwin GOARCH=${{ matrix.arch }} go build -ldflags "-s -w -X 'github.com/${{ github.repository }}/cmd.version=$VERSION' -X 'github.com/${{ github.repository }}/cmd.commitSHA=$COMMIT_SHA'" -o /dev/null cmd/windsor/main.go
          fi

      - name: Test Build Windsor CLI on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          $env:VERSION = $env:GITHUB_REF -replace 'refs/heads/', '' -replace 'refs/tags/', ''
          echo "Testing build for version: $env:VERSION"
          $env:COMMIT_SHA = "${{ github.sha }}"
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.arch }}"
          go build -ldflags "-s -w -X 'github.com/${{ github.repository }}/cmd.version=$env:VERSION' -X 'github.com/${{ github.repository }}/cmd.commitSHA=$env:COMMIT_SHA'" -o NUL cmd\windsor\main.go
        shell: pwsh

  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7 renovate: depName=actions/setup-go
        with:
          go-version-file: go.mod

      - name: Cache Go Modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
  
      - name: Install Dependencies
        run: go install ./...

      - name: Run Gosec Security Scanner
        uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3 # v2.28.0
        with:
          args: ./...
        env:
          GOTOOLCHAIN: 'auto'
          GOFLAGS: '-buildvcs=false'

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7 renovate: depName=actions/setup-go
        with:
          go-version-file: go.mod

      - name: Cache Go Modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Regenerate command and schema reference
        run: |
          go run ./internal/gendocs commands
          go run ./internal/gendocs schema

      - name: Fail if regen produced a diff
        run: |
          # Use git status (not git diff) so untracked files (new cobra
          # commands or new schema pages) are detected alongside modifications
          # and deletions. Generated paths checked: docs/reference/commands/
          # (cobra-driven) and each <schema>.md derived from a *.yaml file
          # under pkg/runtime/config/schemas/artifacts/. Sibling
          # pkg/runtime/config/schemas/*.yaml is the windsor.yaml runtime
          # validator's go:embed source and is not documented as an artifact.
          #
          # Build the path list as a bash array so each entry remains a
          # single arg even if a schema basename ever contains a space or
          # glob character; relying on unquoted IFS-split would silently pass
          # the wrong arguments to git in that case. 'while IFS= read' is used
          # over 'mapfile' for bash 3.2 portability (devs on macOS debugging
          # this locally).
          schema_paths=()
          while IFS= read -r path; do
            [ -n "$path" ] && schema_paths+=("$path")
          done < <(find pkg/runtime/config/schemas/artifacts -maxdepth 1 -name '*.yaml' \
            -exec basename {} .yaml \; | sed 's|^|docs/reference/|;s|$|.md|')
          changes=$(git status --porcelain docs/reference/commands/ "${schema_paths[@]}")
          if [ -n "$changes" ]; then
            echo "::error::Generated docs are out of sync with their source-of-truth."
            echo "::error::Run 'task docs:gen' locally and commit the result."
            echo "Changes:"
            echo "$changes"
            # Intent-to-add new pages so 'git diff' shows their full content
            # as additions, not just '?? new-file.md' lines in the status output.
            git add -N docs/reference/commands/ "${schema_paths[@]}" 2>/dev/null || true
            git --no-pager diff docs/reference/commands/ "${schema_paths[@]}"
            exit 1
          fi

  build-nightly:
    runs-on: windows-latest
    needs: [build-and-test, sast-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: build-nightly
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7 renovate: depName=actions/setup-go
        with:
          go-version-file: go.mod

      - name: Pin blueprint to core :latest
        run: echo "PINNED_BLUEPRINT_URL=oci://ghcr.io/windsorcli/core:latest" >> $GITHUB_ENV
        shell: bash

      - name: Build artifacts (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          # chocolatey packaging rejects the snapshot version string
          # (nightly-SNAPSHOT-<sha> isn't valid SemVer); skip it on nightlies.
          # SBOM generation is also skipped to keep the snapshot path fast —
          # nightlies are for live-on-the-edge users, not procurement review.
          # Real releases run on a tag with a SemVer version, so chocolatey
          # + SBOMs + SLSA attestation all ship via the separate `release` job below.
          args: release --snapshot --clean --skip=sign,chocolatey,sbom
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Replace nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          shopt -s nullglob
          artifacts=(dist/windsor_nightly_*.tar.gz dist/windsor_nightly_*.zip)
          shopt -u nullglob

          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "No nightly artifacts found in dist/" >&2
            exit 1
          fi

          gh release delete nightly --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create nightly \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --target "$SHA" \
            --title "Nightly (latest main)" \
            --notes "Rolling build from \`main\` @ ${SHA:0:7}. Unstable — for users living on the edge." \
            "${artifacts[@]}" dist/checksums.txt
        shell: bash

  release:
    runs-on: windows-latest
    needs: [build-and-test, sast-scan]
    if: startsWith(github.ref, 'refs/tags/')
    # id-token + attestations are required for actions/attest-build-provenance
    # to sign the release artifacts via Sigstore and write the attestation back
    # to the repository's /attestations API. issues/pull-requests reads mirror
    # the workflow-level grants — a job-level permissions block fully replaces
    # the workflow-level one (no merge), so list them here to preserve goreleaser's
    # ability to enrich the changelog with PR/issue context if changelog.use is
    # ever switched to "github".
    permissions:
      contents: write
      id-token: write
      attestations: write
      issues: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7 renovate: depName=actions/setup-go
        with:
          go-version-file: go.mod

      - name: Setup Windows optimization environment  
        run: |
          echo "GOCACHE=D:\go-cache" >> $env:GITHUB_ENV
          echo "GOMODCACHE=D:\go-mod" >> $env:GITHUB_ENV
          echo "GOTMPDIR=D:\go-tmp" >> $env:GITHUB_ENV
          echo "TMP=D:\tmp" >> $env:GITHUB_ENV
          echo "TEMP=D:\tmp" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Force -Path "D:\go-cache"
          New-Item -ItemType Directory -Force -Path "D:\go-mod"
          New-Item -ItemType Directory -Force -Path "D:\go-tmp" 
          New-Item -ItemType Directory -Force -Path "D:\tmp"
        shell: pwsh

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Check if prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Fetch latest core version
        id: core_version
        run: |
          # Fetch the latest release tag from windsorcli/core
          LATEST_TAG=$(curl -s "https://api.github.com/repos/windsorcli/core/releases/latest" | jq -r '.tag_name')
          if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "Warning: Could not fetch latest core version, using fallback"
            LATEST_TAG="latest"
          fi
          echo "Found latest core version: $LATEST_TAG"
          echo "PINNED_BLUEPRINT_URL=oci://ghcr.io/windsorcli/core:$LATEST_TAG" >> $GITHUB_ENV
        shell: bash

      # syft is the SBOM generator goreleaser's `sboms:` block shells out to.
      # The download action places the binary on PATH so goreleaser auto-discovers it.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean ${{ steps.prerelease.outputs.prerelease == 'true' && '--skip=chocolatey,homebrew' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ env.GPG_FINGERPRINT }}
          GITHUB_SHA: ${{ github.sha }}
          HOMEBREW_CLI_WRITE_PAT: ${{ secrets.HOMEBREW_CLI_WRITE_PAT }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

      # SLSA v1.0 build-provenance attestations for every release archive +
      # checksums file. The attestation is signed via Sigstore using the
      # workflow's OIDC token and published to the repository's /attestations
      # endpoint, where it can be verified with `gh attestation verify`.
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
            dist/*.sbom.cdx.json
