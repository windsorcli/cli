$schema: https://json-schema.org/draft/2020-12/schema
title: Providers Configuration Schema
description: Schema for cloud provider configurations
type: object

properties:
  aws:
    type: object
    description: AWS provider configuration. AWS integration activates whenever this block is present in a context (or when platform is "aws"); there is no separate enabled flag.
    properties:
      endpoint_url:
        type: string
        description: Custom endpoint URL for AWS services
      profile:
        type: string
        description: AWS CLI profile to use for authentication
      region:
        type: string
        description: AWS region for API calls, exported to tools as AWS_REGION
      s3_hostname:
        type: string
        description: Custom hostname for the S3 service
      mwaa_endpoint:
        type: string
        description: Endpoint for Managed Workflows for Apache Airflow
    additionalProperties: false

  azure:
    type: object
    description: Azure provider configuration
    properties:
      enabled:
        type: boolean
        description: Enable or disable Azure integration
      subscription_id:
        type: string
        description: Azure subscription identifier
      tenant_id:
        type: string
        description: Azure tenant identifier
      environment:
        type: string
        description: Azure cloud environment (e.g. "public", "usgovernment")
    additionalProperties: false

  gcp:
    type: object
    description: GCP provider configuration
    properties:
      enabled:
        type: boolean
        description: Enable or disable GCP integration
      project_id:
        type: string
        description: GCP project identifier
      credentials_path:
        type: string
        description: Path to a service account key file
      quota_project:
        type: string
        description: Project to use for quota and billing
    additionalProperties: false

  vsphere:
    type: object
    description: vSphere provider configuration. vSphere integration activates whenever this block is present in a context (or when platform is "vsphere"); there is no separate enabled flag.
    properties:
      server:
        type: string
        description: vCenter server hostname or IP address, exported as VSPHERE_SERVER
      user:
        type: string
        description: vCenter username, exported as VSPHERE_USER
      datacenter:
        type: string
        description: vSphere datacenter name (exact inventory match, e.g. "dc-prod")
      cluster:
        type: string
        description: vSphere compute cluster name where VMs are scheduled (e.g. "cluster-01")
      datastore:
        type: string
        description: Datastore or datastore cluster name for VM disk placement
      network:
        type: string
        description: Port group name the VM primary NIC attaches to
      resource_pool:
        type: string
        description: Resource pool path relative to the compute cluster. Defaults to the cluster root pool.
      folder:
        type: string
        description: VM folder path relative to the datacenter VM folder root. Defaults to the datacenter root.
      insecure:
        type: boolean
        description: Disable TLS certificate verification when connecting to vCenter, exported as VSPHERE_ALLOW_UNVERIFIED_SSL
    additionalProperties: false

additionalProperties: false
