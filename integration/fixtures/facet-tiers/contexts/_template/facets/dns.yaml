kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: dns
  description: Depends on cert-manager by its bare name to exercise install-tier resolution; omits path to exercise path-defaults-to-name

kustomize:

- name: dns
  components:
  - coredns
  dependsOn:
  - cert-manager
  timeout: 5m
  interval: 5m
