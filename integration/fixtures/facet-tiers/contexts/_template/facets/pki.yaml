kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: pki
  description: cert-manager as a flux system entry with install and resources tiers

flux:

- name: cert-manager
  path: pki/cert-manager
  install:
    components:
    - helm-release
    timeout: 5m
    interval: 5m
  resources:
  - components:
    - private-issuer/ca
    timeout: 5m
    interval: 5m
