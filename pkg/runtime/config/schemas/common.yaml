$schema: https://windsorcli.dev/schema/2026-02/schema
type: object
properties:
  platform:
    type: string
    enum:
      - none
      - docker
      - incus
      - hyperv
      - metal
      - omni
      - aws
      - azure
      - gcp

  cluster:
    type: object
    properties:
      driver:
        type: string

  workstation:
    type: object
    properties:
      arch:
        type: string
        enum:
          - amd64
          - arm64
        description: CPU architecture for Incus Talos images (host arch when workstation enabled; target arch for server deployments). Used by talos.incus_image.
      address:
        type: string
        description: Address of the workstation, used for SSH to configure workstation networking
      runtime:
        type: string
        enum:
          - colima
          - docker-desktop
          - docker
        description: Host runtime for local clusters. VM-backed (colima, docker-desktop) or plain engine (docker).
      services:
        type: object
        properties:
          dns:
            type: boolean
            default: true
            description: Create the DNS (CoreDNS) container
          git:
            type: boolean
            default: true
            description: Create the git livereload container
          registries:
            type: boolean
            default: true
            description: Create registry proxy containers (from docker.registries when true)
        additionalProperties: false
        description: Toggle workstation services
      dns:
        type: object
        description: Workstation-specific DNS state (server address, forwarders)
        properties:
          address:
            type: string
            description: DNS server address resolved from workstation infrastructure
          forward:
            type: array
            items:
              type: string
            description: Forward DNS servers
        additionalProperties: false
    additionalProperties: false

allOf:
  # Platform → cluster.driver derivation. The CLI applies these as fallbacks: an
  # explicit cluster.driver from a blueprint default or user config always wins.
  - if:
      properties:
        platform:
          enum: [docker, incus, hyperv, metal, omni]
    then:
      properties:
        cluster:
          type: object
          properties:
            driver:
              default: talos
  - if:
      properties:
        platform:
          const: aws
    then:
      properties:
        cluster:
          type: object
          properties:
            driver:
              default: eks
  - if:
      properties:
        platform:
          const: azure
    then:
      properties:
        cluster:
          type: object
          properties:
            driver:
              default: aks
  - if:
      properties:
        platform:
          const: gcp
    then:
      properties:
        cluster:
          type: object
          properties:
            driver:
              default: gke
